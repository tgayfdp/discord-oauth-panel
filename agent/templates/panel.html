<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kali Agent Panel</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:monospace;background:#0a0a0a;color:#0f0;height:100vh;overflow:hidden}
.tabs{display:flex;background:#111;border-bottom:2px solid #0f03;padding:0;flex-wrap:wrap}
.tab{padding:12px 20px;cursor:pointer;color:#080;border:none;background:none;font-family:monospace;font-size:13px}
.tab:hover{color:#0f0;background:#0f01}
.tab.active{color:#0f0;background:#0f02;border-bottom:2px solid #0f0}
.panel{display:none;height:calc(100vh - 44px)}
.panel.active{display:flex;flex-direction:column}
#terminal-panel{background:#000}
#terminal-output{flex:1;background:#000;color:#0f0;font-family:monospace;font-size:13px;padding:10px;overflow-y:auto;white-space:pre-wrap;word-wrap:break-word;line-height:1.4}
#terminal-input-row{display:flex;background:#111;border-top:1px solid #0f03}
#terminal-input{flex:1;background:#000;color:#0f0;border:none;outline:none;font-family:monospace;font-size:13px;padding:10px}
#terminal-input-btn{background:#0f02;color:#0f0;border:1px solid#0f03;padding:10px 16px;cursor:pointer;font-family:monospace;font-size:13px}
#terminal-input-btn:hover{background:#0f04}
.stream-container{flex:1;display:flex;align-items:center;justify-content:center;background:#000;position:relative;overflow:hidden}
.stream-container img{max-width:100%;max-height:100%;object-fit:contain;cursor:default}
.stream-container img.remote-active{cursor:crosshair}
.stream-placeholder{color:#060;font-size:16px}
.stream-controls{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
.stream-controls button{background:#0f02;color:#0f0;border:1px solid#0f03;padding:8px 14px;cursor:pointer;font-family:monospace;font-size:12px}
.stream-controls button:hover{background:#0f04}
.stream-controls button.active-remote{background:#0f0;color:#000}
#remote-status{position:absolute;top:10px;left:10px;color:#0f0;font-size:12px;background:#000a;padding:4px 10px;border-radius:4px;z-index:10;display:none}
#remote-cursor{position:absolute;pointer-events:none;z-index:5;display:none;width:4px;height:4px;background:#0f0;border:1px solid #000;border-radius:50%}
.file-toolbar{display:flex;gap:8px;padding:8px 10px;background:#111;border-bottom:1px solid #0f03;align-items:center;flex-wrap:wrap}
.file-toolbar input{flex:1;min-width:100px;background:#000;color:#0f0;border:1px solid#0f03;padding:6px 8px;font-family:monospace;font-size:12px}
.file-toolbar button{background:#0f02;color:#0f0;border:1px solid#0f03;padding:6px 12px;cursor:pointer;font-family:monospace;font-size:12px}
.file-toolbar button:hover{background:#0f04}
#file-list{flex:1;overflow-y:auto;padding:6px 10px;font-size:13px}
.file-item{padding:4px 8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.file-item:hover{background:#0f02}
.file-item .name{color:#0f0}
.file-item .name.dir{color:#0f0;font-weight:bold}
.file-item .size{color:#060;font-size:11px;margin-left:10px}
.file-item .actions button{background:none;color:#f00;border:none;cursor:pointer;font-family:monospace;font-size:12px;margin-left:6px}
.file-item .actions button.edit-btn{color:#0f0}
.upload-zone{border:2px dashed #0f03;padding:12px;text-align:center;color:#060;margin:6px 10px;cursor:pointer;font-size:13px}
.upload-zone:hover{border-color:#0f0;color:#0f0}
#editor-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000c;z-index:100}
#editor-overlay.active{display:flex;flex-direction:column}
#editor-bar{display:flex;justify-content:space-between;background:#111;padding:8px 12px;border-bottom:1px solid #0f03}
#editor-bar span{color:#0f0;font-size:13px}
#editor-bar button{background:#0f02;color:#0f0;border:1px solid#0f03;padding:6px 12px;cursor:pointer;font-family:monospace}
#editor-bar button:hover{background:#0f04}
#editor-text{flex:1;background:#000;color:#0f0;border:none;outline:none;font-family:monospace;font-size:13px;padding:12px;resize:none;tab-size:4}
#status{position:fixed;bottom:6px;right:10px;color:#060;font-size:11px;z-index:50}
</style>
</head>
<body>
<div class="tabs">
  <div class="tab active" onclick="switchTab('terminal')">[Terminal]</div>
  <div class="tab" onclick="switchTab('screen')">[Ecran]</div>
  <div class="tab" onclick="switchTab('webcam')">[Webcam]</div>
  <div class="tab" onclick="switchTab('files')">[Fichiers]</div>
  <div class="tab" onclick="switchTab('system')">[Systeme]</div>
</div>

<div id="terminal-panel" class="panel active">
  <div id="terminal-output"></div>
  <div id="terminal-input-row">
    <input id="terminal-input" placeholder="$ commande..." />
    <button id="terminal-input-btn">EXEC</button>
  </div>
</div>

<div id="screen-panel" class="panel">
  <div class="stream-container" id="screen-container">
    <div class="stream-placeholder" id="screen-placeholder">[Cliquer pour démarrer le streaming ecran]</div>
    <img id="screen-image" style="display:none" />
    <div id="remote-cursor"></div>
    <div id="remote-status">Remote: OFF</div>
    <div class="stream-controls">
      <button onclick="startScreen()">Stream</button>
      <button onclick="stopScreen()">Stop</button>
      <button onclick="captureScreen()">Capture</button>
      <button id="remote-toggle" onclick="toggleRemote()">Remote: OFF</button>
    </div>
  </div>
</div>

<div id="webcam-panel" class="panel">
  <div class="stream-container">
    <div class="stream-placeholder" id="webcam-placeholder">[Cliquer pour démarrer la webcam]</div>
    <img id="webcam-image" style="display:none" />
    <div class="stream-controls">
      <button onclick="startWebcam()">Stream</button>
      <button onclick="stopWebcam()">Stop</button>
      <button onclick="captureWebcam()">Capture</button>
    </div>
  </div>
</div>

<div id="files-panel" class="panel">
  <div class="file-toolbar">
    <span id="current-path" style="color:#060;font-size:12px">/</span>
    <button onclick="refreshFiles()">R</button>
    <button onclick="goUp()">..</button>
  </div>
  <div id="file-list"></div>
  <div class="upload-zone" onclick="document.getElementById('file-upload').click()">
    [+] Uploader un fichier
    <input type="file" id="file-upload" style="display:none" onchange="uploadFile(this)" />
  </div>
</div>

<div id="editor-overlay">
  <div id="editor-bar">
    <span id="editor-path">Fichier</span>
    <div>
      <button onclick="saveFile()">[Sauvegarder]</button>
      <button onclick="closeEditor()">[Fermer]</button>
    </div>
  </div>
  <textarea id="editor-text" spellcheck="false"></textarea>
</div>

<div id="system-panel" class="panel">
  <div style="flex:1;overflow-y:auto;padding:16px;font-size:13px">
    <div id="sys-info" style="color:#060;text-align:center;padding:40px">Chargement...</div>
  </div>
  <div style="padding:8px;border-top:1px solid #0f03;background:#111;text-align:center">
    <button onclick="loadSysInfo()" style="background:#0f02;color:#0f0;border:1px solid#0f03;padding:6px 12px;cursor:pointer;font-family:monospace;font-size:12px">Rafraichir</button>
  </div>
</div>

<div id="status"></div>

<script>
const PASSWORD = '{{password}}';
const socket = io({auth:{token:PASSWORD}});
let screenRunning = false, webcamRunning = false, remoteActive = false;
let currentPath = '/home';
let editingPath = '';
let screenW = 1920, screenH = 1080;

function authHeaders() {
  return {'Authorization': PASSWORD};
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const tab = document.querySelector(`.tab[onclick*="${name}"]`);
  if(tab) tab.classList.add('active');
  document.getElementById(name+'-panel').classList.add('active');
  if(name==='files') refreshFiles();
  if(name==='system') loadSysInfo();
}

// ====== TERMINAL ======
const output = document.getElementById('terminal-output');
const termInput = document.getElementById('terminal-input');

function appendOutput(text) {
  output.textContent += text;
  output.scrollTop = output.scrollHeight;
}

socket.on('shell:data', (d) => {
  appendOutput(d.data);
});

termInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && termInput.value.trim()) {
    appendOutput('$ ' + termInput.value + '\n');
    socket.emit('shell:input', {data: termInput.value + '\n'});
    termInput.value = '';
  }
});

document.getElementById('terminal-input-btn').onclick = () => {
  const cmd = document.getElementById('terminal-input').value;
  if(!cmd.trim()) return;
  fetch('/api/exec', {
    method:'POST',
    headers:{'Content-Type':'application/json', ...authHeaders()},
    body:JSON.stringify({cmd})
  }).then(r=>r.json()).then(d=>{
    appendOutput('$ ' + cmd + '\n');
    if(d.stdout) appendOutput(d.stdout);
    if(d.stderr) appendOutput(d.stderr);
    if(d.code !== undefined) appendOutput('\n[code: ' + d.code + ']\n');
  });
  document.getElementById('terminal-input').value = '';
};

// ====== SCREEN STREAM ======
const screenImg = document.getElementById('screen-image');
const screenContainer = document.getElementById('screen-container');
const screenPlaceholder = document.getElementById('screen-placeholder');
const remoteCursor = document.getElementById('remote-cursor');
const remoteStatus = document.getElementById('remote-status');
const remoteToggle = document.getElementById('remote-toggle');

socket.on('screen:frame', (d) => {
  screenImg.src = 'data:image/jpeg;base64,' + d.image;
  screenImg.style.display = '';
  screenPlaceholder.style.display = 'none';
});

function startScreen() {
  if(screenRunning) return;
  screenRunning = true;
  socket.emit('start:screen');
  screenPlaceholder.textContent = '[Streaming ecran...]';
}

function stopScreen() {
  screenRunning = false;
  screenImg.style.display = 'none';
  screenPlaceholder.style.display = '';
  screenPlaceholder.textContent = '[Stream arrete]';
}

function captureScreen() {
  fetch('/api/screenshot', {headers:authHeaders()})
    .then(r=>r.json()).then(d=>{
      if(d.image) {
        screenImg.src = 'data:image/jpeg;base64,' + d.image;
        screenImg.style.display = '';
        screenPlaceholder.style.display = 'none';
      }
    });
}

// ====== REMOTE CONTROL (TeamViewer-like) ======
function toggleRemote() {
  remoteActive = !remoteActive;
  if(remoteActive) {
    remoteToggle.textContent = 'Remote: ON';
    remoteToggle.classList.add('active-remote');
    remoteStatus.textContent = 'Remote: ON';
    remoteStatus.style.display = 'block';
    screenImg.classList.add('remote-active');
  } else {
    remoteToggle.textContent = 'Remote: OFF';
    remoteToggle.classList.remove('active-remote');
    remoteStatus.style.display = 'none';
    screenImg.classList.remove('remote-active');
    remoteCursor.style.display = 'none';
  }
}

function getRemoteCoords(clientX, clientY) {
  const rect = screenImg.getBoundingClientRect();
  const imgX = clientX - rect.left;
  const imgY = clientY - rect.top;
  const scaleX = screenW / rect.width;
  const scaleY = screenH / rect.height;
  return {
    x: Math.round(imgX * scaleX),
    y: Math.round(imgY * scaleY),
    imgX, imgY
  };
}

// Mouse move on screen image
screenImg.addEventListener('mousemove', (e) => {
  if(!remoteActive || !screenRunning) return;
  const coords = getRemoteCoords(e.clientX, e.clientY);
  remoteCursor.style.display = 'block';
  remoteCursor.style.left = (coords.imgX - 2) + 'px';
  remoteCursor.style.top = (coords.imgY - 2) + 'px';
  socket.emit('remote:mousemove', {x: coords.x, y: coords.y});
});

// Click events
screenImg.addEventListener('mousedown', (e) => {
  if(!remoteActive || !screenRunning) return;
  e.preventDefault();
  const btn = ['left', 'middle', 'right'][e.button] || 'left';
  const coords = getRemoteCoords(e.clientX, e.clientY);
  socket.emit('remote:mousemove', {x: coords.x, y: coords.y});
  socket.emit('remote:mousedown', {button: btn});
});

screenImg.addEventListener('mouseup', (e) => {
  if(!remoteActive || !screenRunning) return;
  e.preventDefault();
  const btn = ['left', 'middle', 'right'][e.button] || 'left';
  socket.emit('remote:mouseup', {button: btn});
});

screenImg.addEventListener('wheel', (e) => {
  if(!remoteActive || !screenRunning) return;
  e.preventDefault();
  const key = e.deltaY < 0 ? 'Page_Up' : 'Page_Down';
  socket.emit('remote:key', {key});
});

// Mouse leave
screenImg.addEventListener('mouseleave', () => {
  remoteCursor.style.display = 'none';
});

// Keyboard for remote typing
document.addEventListener('keydown', (e) => {
  if(!remoteActive || !screenRunning) return;
  if(e.ctrlKey || e.metaKey || e.altKey) return;

  const keyMap = {
    'Enter': 'Return', 'Backspace': 'BackSpace', 'Tab': 'Tab',
    'Escape': 'Escape', 'Delete': 'Delete', 'Home': 'Home',
    'End': 'End', 'PageUp': 'Page_Up', 'PageDown': 'Page_Down',
    'ArrowUp': 'Up', 'ArrowDown': 'Down', 'ArrowLeft': 'Left', 'ArrowRight': 'Right',
    'F1':'F1','F2':'F2','F3':'F3','F4':'F4','F5':'F5','F6':'F6',
    'F7':'F7','F8':'F8','F9':'F9','F10':'F10','F11':'F11','F12':'F12'
  };

  const key = keyMap[e.key];
  if(key) {
    e.preventDefault();
    socket.emit('remote:key', {key});
  } else if(e.key.length === 1) {
    socket.emit('remote:type', {text: e.key});
  }
});

// ====== WEBCAM ======
const webcamImg = document.getElementById('webcam-image');
const webcamPlaceholder = document.getElementById('webcam-placeholder');

socket.on('webcam:frame', (d) => {
  webcamImg.src = 'data:image/jpeg;base64,' + d.image;
  webcamImg.style.display = '';
  webcamPlaceholder.style.display = 'none';
});

function startWebcam() {
  if(webcamRunning) return;
  webcamRunning = true;
  socket.emit('start:webcam');
  webcamPlaceholder.textContent = '[Streaming webcam...]';
}

function stopWebcam() {
  webcamRunning = false;
  webcamImg.style.display = 'none';
  webcamPlaceholder.style.display = '';
  webcamPlaceholder.textContent = '[Stream arrete]';
}

function captureWebcam() {
  fetch('/api/webcam', {headers:authHeaders()})
    .then(r=>r.json()).then(d=>{
      if(d.image) {
        webcamImg.src = 'data:image/jpeg;base64,' + d.image;
        webcamImg.style.display = '';
        webcamPlaceholder.style.display = 'none';
      }
    });
}

// ====== FILES ======
function refreshFiles(dir) {
  const path = dir || currentPath;
  fetch('/api/ls?path=' + encodeURIComponent(path), {headers:authHeaders()})
    .then(r=>r.json()).then(d=>{
      if(d.error) return;
      currentPath = d.path;
      document.getElementById('current-path').textContent = d.path;
      const list = document.getElementById('file-list');
      list.innerHTML = '';
      d.items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'file-item';
        const name = document.createElement('span');
        name.className = 'name' + (item.type === 'dir' ? ' dir' : '');
        name.textContent = (item.type === 'dir' ? '📁 ' : '📄 ') + item.name;
        if(item.type === 'dir') {
          name.onclick = () => refreshFiles(d.path + '/' + item.name);
        }
        div.appendChild(name);
        const actions = document.createElement('div');
        actions.className = 'actions';
        if(item.type === 'file') {
          const size = document.createElement('span');
          size.className = 'size';
          size.textContent = formatBytes(item.size);
          actions.appendChild(size);
          const edit = document.createElement('button');
          edit.className = 'edit-btn';
          edit.textContent = '[Edit]';
          edit.onclick = (e) => { e.stopPropagation(); editFile(d.path + '/' + item.name); };
          actions.appendChild(edit);
          const dl = document.createElement('button');
          dl.className = 'edit-btn';
          dl.textContent = '[DL]';
          dl.onclick = (e) => {
            e.stopPropagation();
            window.open('/api/download?path=' + encodeURIComponent(d.path + '/' + item.name) + '&auth=' + PASSWORD);
          };
          actions.appendChild(dl);
        }
        const del = document.createElement('button');
        del.textContent = '[X]';
        del.onclick = (e) => {
          e.stopPropagation();
          if(confirm('Supprimer ' + item.name + ' ?'))
            fetch('/api/delete', {method:'POST',headers:{'Content-Type':'application/json', ...authHeaders()},body:JSON.stringify({path: d.path + '/' + item.name})})
              .then(() => refreshFiles(d.path));
        };
        actions.appendChild(del);
        div.appendChild(actions);
        list.appendChild(div);
      });
    });
}

function goUp() {
  const parent = currentPath.replace(/\/+$/, '').split('/').slice(0,-1).join('/') || '/';
  refreshFiles(parent);
}

function uploadFile(input) {
  const file = input.files[0];
  if(!file) return;
  const formData = new FormData();
  formData.append('file', file);
  fetch('/api/upload?path=' + encodeURIComponent(currentPath) + '&auth=' + PASSWORD, {method:'POST',body:formData})
    .then(r=>r.json()).then(() => { refreshFiles(currentPath); input.value = ''; });
}

// ====== EDITOR ======
function editFile(path) {
  editingPath = path;
  document.getElementById('editor-path').textContent = path;
  document.getElementById('editor-text').value = 'Chargement...';
  document.getElementById('editor-overlay').classList.add('active');
  fetch('/api/read', {method:'POST',headers:{'Content-Type':'application/json', ...authHeaders()},body:JSON.stringify({path})})
    .then(r=>r.json()).then(d=>{
      if(d.content !== undefined) {
        document.getElementById('editor-text').value = d.content;
      } else {
        document.getElementById('editor-text').value = 'Erreur: ' + (d.error || 'Impossible de lire');
      }
    });
}

function saveFile() {
  const content = document.getElementById('editor-text').value;
  fetch('/api/write', {method:'POST',headers:{'Content-Type':'application/json', ...authHeaders()},body:JSON.stringify({path:editingPath, content})})
    .then(r=>r.json()).then(d=>{
      if(d.ok) {
        document.getElementById('editor-bar').querySelector('span').textContent = '✓ Sauvegardé - ' + editingPath;
        setTimeout(() => {
          document.getElementById('editor-bar').querySelector('span').textContent = editingPath;
        }, 2000);
      }
    });
}

function closeEditor() {
  document.getElementById('editor-overlay').classList.remove('active');
  editingPath = '';
}

function formatBytes(bytes) {
  if(bytes < 1024) return bytes + ' B';
  if(bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

// ====== SYSTEM INFO ======
function loadSysInfo() {
  const el = document.getElementById('sys-info');
  el.innerHTML = 'Chargement...';
  el.style.color = '#060';
  fetch('/api/sysinfo', {headers:authHeaders()})
    .then(r=>r.json()).then(d=>{
      if(d.error) {
        el.innerHTML = 'Erreur: ' + d.error;
        el.style.color = '#f00';
        return;
      }
      let html = '';
      // RAM
      const memPct = d.memory.total_mb > 0 ? (d.memory.used_mb / d.memory.total_mb * 100).toFixed(1) : 0;
      html += '<div style="margin-bottom:16px">';
      html += '<div style="color:#0f0;font-weight:bold;margin-bottom:6px">💾 MEMOIRE (RAM)</div>';
      html += '<div style="color:#aaa">Total: <b style="color:#0f0">' + d.memory.total_mb + ' MB</b></div>';
      html += '<div style="color:#aaa">Utilise: <b style="color:' + (memPct > 80 ? '#f00' : '#0f0') + '">' + d.memory.used_mb + ' MB</b></div>';
      html += '<div style="color:#aaa">Disponible: <b style="color:#0f0">' + d.memory.avail_mb + ' MB</b></div>';
      html += '<div style="background:#111;height:16px;border-radius:8px;margin-top:4px;overflow:hidden;border:1px solid #0f03"><div style="width:' + memPct + '%;height:100%;background:' + (memPct > 80 ? '#f00' : '#0f0') + ';transition:width 0.3s"></div></div>';
      if(d.memory.swap_total_mb > 0) {
        html += '<div style="color:#aaa;margin-top:4px">Swap: ' + d.memory.swap_free_mb + '/' + d.memory.swap_total_mb + ' MB</div>';
      }
      html += '</div>';
      // DISK
      html += '<div style="margin-bottom:16px">';
      html += '<div style="color:#0f0;font-weight:bold;margin-bottom:6px">💽 DISQUE</div>';
      html += '<div style="color:#aaa">Total: <b style="color:#0f0">' + d.disk.total_gb + ' GB</b></div>';
      html += '<div style="color:#aaa">Utilise: <b style="color:' + (d.disk.percent > 80 ? '#f00' : '#0f0') + '">' + d.disk.used_gb + ' GB</b></div>';
      html += '<div style="color:#aaa">Libre: <b style="color:#0f0">' + d.disk.free_gb + ' GB</b></div>';
      html += '<div style="background:#111;height:16px;border-radius:8px;margin-top:4px;overflow:hidden;border:1px solid #0f03"><div style="width:' + d.disk.percent + '%;height:100%;background:' + (d.disk.percent > 80 ? '#f00' : '#0f0') + ';transition:width 0.3s"></div></div>';
      html += '</div>';
      // CPU
      html += '<div style="margin-bottom:16px">';
      html += '<div style="color:#0f0;font-weight:bold;margin-bottom:6px">⚡ CPU</div>';
      html += '<div style="color:#aaa">Modele: <b style="color:#0f0;font-size:11px">' + d.cpu.model + '</b></div>';
      html += '<div style="color:#aaa">Coeurs: <b style="color:#0f0">' + d.cpu.cores + '</b></div>';
      html += '<div style="color:#aaa">Charge: 1m: <b style="color:#0f0">' + d.cpu.load_1m + '</b> | 5m: <b style="color:#0f0">' + d.cpu.load_5m + '</b> | 15m: <b style="color:#0f0">' + d.cpu.load_15m + '</b></div>';
      html += '</div>';
      // Processus
      html += '<div style="color:#aaa">Processus actifs: <b style="color:#0f0">' + d.processes + '</b></div>';
      el.innerHTML = html;
      el.style.color = '#0f0';
      el.style.textAlign = 'left';
    }).catch(() => {
      el.innerHTML = 'Erreur de connexion';
      el.style.color = '#f00';
    });
}

// ====== STATUS ======
fetch('/api/info', {headers:authHeaders()}).then(r=>r.json()).then(d=>{
  document.getElementById('status').textContent = d.hostname + ' | ' + d.user + ' | ' + (d.ip||'');
  if(d.screen_w) { screenW = d.screen_w; screenH = d.screen_h; }
}).catch(()=>{});

setTimeout(() => refreshFiles(), 500);
</script>
</body>
</html>
