<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kali Agent</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
:root{--bg:#0a0e0a;--surface:#0f130f;--border:#1a2a1a;--green:#00ff41;--green-dim:#005a1a;--green-dark:#002a0a;--red:#ff0040;--yellow:#ffd000;--cyan:#00f0ff;--text:#c0e0c0;--text-dim:#406040}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;text-shadow:0 0 5px var(--green-dim)}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 16px;cursor:pointer;color:var(--text-dim);border:none;background:none;font-family:inherit;font-size:12px;white-space:nowrap;flex-shrink:0;transition:all .2s;position:relative}
.tab:hover{color:var(--green);background:rgba(0,255,65,.04)}
.tab.active{color:var(--green);background:rgba(0,255,65,.08)}
.tab.active::after{content:'';position:absolute;bottom:0;left:20%;width:60%;height:2px;background:var(--green);box-shadow:0 0 10px var(--green)}
.panel{display:none;height:calc(100vh - 41px)}
.panel.active{display:flex;flex-direction:column}
#terminal-panel{background:var(--bg)}
#terminal-output{flex:1;background:var(--bg);color:var(--text);font-family:inherit;font-size:13px;padding:12px;overflow-y:auto;white-space:pre-wrap;word-wrap:break-word;line-height:1.6;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
#terminal-output::-webkit-scrollbar{width:4px}
#terminal-output::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.term-prompt{color:var(--green);font-weight:700}
.term-cmd{color:var(--text)}
.term-output{color:var(--text-dim)}
#terminal-input-row{display:flex;background:var(--surface);border-top:1px solid var(--border);padding:4px}
#terminal-input{flex:1;background:transparent;color:var(--green);border:none;outline:none;font-family:inherit;font-size:13px;padding:8px 12px}
#terminal-input::placeholder{color:var(--text-dim);opacity:.4}
#terminal-input-btn{background:var(--green-dark);color:var(--green);border:1px solid var(--border);padding:8px 16px;cursor:pointer;font-family:inherit;font-size:12px;transition:all .2s}
#terminal-input-btn:hover{background:var(--green);color:var(--bg);box-shadow:0 0 20px var(--green-dim)}
.stream-container{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.stream-container img{max-width:100%;max-height:100%;object-fit:contain;cursor:default;border-radius:4px}
.stream-container img.remote-active{cursor:crosshair;box-shadow:0 0 30px rgba(0,255,65,.1)}
.stream-placeholder{color:var(--text-dim);font-size:14px;opacity:.5}
.stream-controls{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;flex-wrap:wrap;justify-content:center;background:rgba(10,14,10,.85);padding:8px 12px;border-radius:8px;border:1px solid var(--border);backdrop-filter:blur(10px)}
.stream-controls button{background:transparent;color:var(--text-dim);border:1px solid var(--border);padding:6px 14px;cursor:pointer;font-family:inherit;font-size:11px;border-radius:4px;transition:all .2s}
.stream-controls button:hover{color:var(--green);border-color:var(--green);box-shadow:0 0 15px var(--green-dim)}
.stream-controls button.active-btn{background:var(--green);color:var(--bg);border-color:var(--green);box-shadow:0 0 20px var(--green-dim)}
#remote-status{position:absolute;top:12px;left:12px;color:var(--green);font-size:11px;background:rgba(10,14,10,.85);padding:4px 12px;border-radius:4px;z-index:10;display:none;border:1px solid var(--green);box-shadow:0 0 15px var(--green-dim)}
#remote-cursor{position:absolute;pointer-events:none;z-index:5;display:none;width:4px;height:4px;background:var(--green);border-radius:50%;box-shadow:0 0 10px var(--green),0 0 20px var(--green)}
.file-toolbar{display:flex;gap:6px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);align-items:center;flex-wrap:wrap}
.file-toolbar span{font-size:12px;color:var(--text-dim);flex:1;min-width:50px;overflow:hidden;text-overflow:ellipsis}
.file-toolbar button{background:transparent;color:var(--text-dim);border:1px solid var(--border);padding:4px 10px;cursor:pointer;font-family:inherit;font-size:11px;border-radius:3px;transition:all .2s}
.file-toolbar button:hover{color:var(--green);border-color:var(--green)}
#file-list{flex:1;overflow-y:auto;padding:4px 12px;font-size:12px;scrollbar-width:thin}
#file-list::-webkit-scrollbar{width:4px}
#file-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.file-item{padding:5px 8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-radius:3px;transition:all .15s}
.file-item:hover{background:rgba(0,255,65,.04);box-shadow:inset 0 0 20px rgba(0,255,65,.02)}
.file-item .name{color:var(--text)}
.file-item .name.dir{color:var(--green);font-weight:700}
.file-item .size{color:var(--text-dim);font-size:10px;margin-left:8px;opacity:.6}
.file-item .actions button{background:none;color:var(--red);border:none;cursor:pointer;font-family:inherit;font-size:11px;margin-left:6px;padding:2px 6px;border-radius:2px;transition:all .15s}
.file-item .actions button:hover{background:rgba(255,0,64,.1)}
.file-item .actions button.edit-btn{color:var(--cyan)}
.file-item .actions button.edit-btn:hover{background:rgba(0,240,255,.1)}
.upload-zone{border:1px dashed var(--border);padding:12px;text-align:center;color:var(--text-dim);margin:8px 12px;cursor:pointer;font-size:12px;border-radius:6px;transition:all .2s;opacity:.6}
.upload-zone:hover{border-color:var(--green);color:var(--green);opacity:1;box-shadow:0 0 20px rgba(0,255,65,.05)}
#editor-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,14,10,.95);z-index:100;backdrop-filter:blur(5px)}
#editor-overlay.active{display:flex;flex-direction:column}
#editor-bar{display:flex;justify-content:space-between;background:var(--surface);padding:8px 16px;border-bottom:1px solid var(--border);align-items:center}
#editor-bar span{color:var(--green);font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis}
#editor-bar button{background:transparent;color:var(--text-dim);border:1px solid var(--border);padding:6px 14px;cursor:pointer;font-family:inherit;font-size:11px;border-radius:4px;transition:all .2s;margin-left:8px}
#editor-bar button:hover{color:var(--green);border-color:var(--green)}
#editor-text{flex:1;background:var(--bg);color:var(--text);border:none;outline:none;font-family:inherit;font-size:13px;padding:16px;resize:none;tab-size:4;line-height:1.6}
#status{position:fixed;bottom:6px;right:12px;color:var(--text-dim);font-size:10px;z-index:50;opacity:.5}
.sys-section{margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px}
.sys-section .title{color:var(--green);font-weight:700;margin-bottom:8px;font-size:13px;letter-spacing:.5px}
.sys-section .row{color:var(--text-dim);font-size:12px;line-height:1.8}
.sys-section .row b{color:var(--text)}
.sys-bar{background:var(--bg);height:12px;border-radius:6px;margin:6px 0;overflow:hidden;border:1px solid var(--border)}
.sys-bar div{height:100%;transition:width .5s ease;border-radius:6px;background:linear-gradient(90deg,var(--green-dim),var(--green));box-shadow:0 0 10px var(--green-dim)}
#sys-info{padding:4px}
.clip-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;margin:12px;display:flex;flex-direction:column;flex:1}
.clip-box .header{color:var(--green);font-weight:700;font-size:13px;padding:12px 16px;border-bottom:1px solid var(--border);letter-spacing:.5px}
.clip-box textarea{flex:1;background:var(--bg);color:var(--text);border:none;outline:none;padding:12px 16px;font-family:inherit;font-size:12px;resize:vertical;min-height:80px}
.clip-box .actions{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border);flex-wrap:wrap}
.clip-box .actions button{background:transparent;color:var(--text-dim);border:1px solid var(--border);padding:6px 14px;cursor:pointer;font-family:inherit;font-size:11px;border-radius:4px;transition:all .2s}
.clip-box .actions button:hover{color:var(--green);border-color:var(--green)}
.clip-box .msg{color:var(--text-dim);font-size:11px;padding:0 16px 8px;opacity:.6}
.power-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px;max-width:400px;width:100%}
.power-btn{padding:16px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;text-align:center;transition:all .3s;background:var(--surface);letter-spacing:1px}
.power-btn:hover{transform:scale(1.03)}
.power-shutdown{color:var(--red);border-color:var(--red)}
.power-shutdown:hover{background:rgba(255,0,64,.1);box-shadow:0 0 25px rgba(255,0,64,.2)}
.power-reboot{color:var(--yellow);border-color:var(--yellow)}
.power-reboot:hover{background:rgba(255,208,0,.1);box-shadow:0 0 25px rgba(255,208,0,.2)}
.power-suspend{color:var(--cyan);border-color:var(--cyan)}
.power-suspend:hover{background:rgba(0,240,255,.1);box-shadow:0 0 25px rgba(0,240,255,.2)}
.power-logout{color:var(--text-dim);border-color:var(--text-dim)}
.power-logout:hover{background:rgba(255,255,255,.05);box-shadow:0 0 25px rgba(255,255,255,.1)}
#power-msg{color:var(--text-dim);font-size:12px;margin-top:8px}
#audio-box{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;flex:1;padding:20px}
#audio-visual{width:80%;max-width:350px;height:30px;background:var(--surface);border-radius:8px;border:1px solid var(--border);overflow:hidden}
#audio-level{width:0%;height:100%;background:linear-gradient(90deg,var(--green-dim),var(--green));transition:width .05s;box-shadow:0 0 15px var(--green-dim)}
#audio-btn{background:transparent;color:var(--text-dim);border:1px solid var(--border);padding:10px 24px;cursor:pointer;font-family:inherit;font-size:12px;border-radius:6px;transition:all .3s}
#audio-btn:hover{color:var(--green);border-color:var(--green);box-shadow:0 0 20px var(--green-dim)}
#audio-btn.active-audio{background:var(--green);color:var(--bg);border-color:var(--green);box-shadow:0 0 25px var(--green-dim)}
#audio-status{color:var(--text-dim);font-size:12px;opacity:.6}
@media(max-width:600px){
  .tab{padding:8px 12px;font-size:11px}
  #terminal-output{font-size:12px;padding:8px}
  .stream-controls{padding:6px 10px;gap:6px}
  .stream-controls button{font-size:10px;padding:5px 10px}
  .power-grid{gap:8px;padding:12px}
  .power-btn{padding:12px;font-size:12px}
  .sys-section{padding:10px}
  .sys-section .row{font-size:11px}
  .file-toolbar{padding:6px 8px}
  #file-list{padding:2px 8px;font-size:11px}
}
</style>
</head>
<body>
<div class="tabs">
  <div class="tab active" onclick="switchTab('terminal')">~$ _</div>
  <div class="tab" onclick="switchTab('screen')">[Screen]</div>
  <div class="tab" onclick="switchTab('webcam')">[Webcam]</div>
  <div class="tab" onclick="switchTab('audio')">[Audio]</div>
  <div class="tab" onclick="switchTab('clipboard')">[Clip]</div>
  <div class="tab" onclick="switchTab('files')">[Files]</div>
  <div class="tab" onclick="switchTab('system')">[Sys]</div>
  <div class="tab" onclick="switchTab('power')">[Power]</div>
</div>

<div id="terminal-panel" class="panel active">
  <div id="terminal-output"></div>
  <div id="terminal-input-row">
    <input id="terminal-input" placeholder="type command..." />
    <button id="terminal-input-btn">exec</button>
  </div>
</div>

<div id="screen-panel" class="panel">
  <div class="stream-container" id="screen-container">
    <div class="stream-placeholder" id="screen-placeholder">[start stream to view]</div>
    <img id="screen-image" style="display:none" />
    <div id="remote-cursor"></div>
    <div id="remote-status">REMOTE: ON</div>
    <div class="stream-controls">
      <button onclick="startScreen()">view</button>
      <button onclick="stopScreen()">stop</button>
      <button onclick="captureScreen()">shot</button>
      <button id="remote-toggle" onclick="toggleRemote()">mouse</button>
    </div>
  </div>
</div>

<div id="webcam-panel" class="panel">
  <div class="stream-container">
    <div class="stream-placeholder" id="webcam-placeholder">[start webcam]</div>
    <img id="webcam-image" style="display:none" />
    <div class="stream-controls">
      <button onclick="startWebcam()">view</button>
      <button onclick="stopWebcam()">stop</button>
      <button onclick="captureWebcam()">shot</button>
    </div>
  </div>
</div>

<div id="audio-panel" class="panel">
  <div id="audio-box">
    <div style="color:var(--text);font-size:20px;opacity:.8">🎤</div>
    <div id="audio-visual"><div id="audio-level"></div></div>
    <button id="audio-btn" onclick="toggleAudio()">start mic stream</button>
    <div id="audio-status">idle</div>
  </div>
</div>

<div id="clipboard-panel" class="panel">
  <div class="clip-box">
    <div class="header">📋 clipboard</div>
    <textarea id="clipboard-text" placeholder="clipboard content..."></textarea>
    <div class="actions">
      <button onclick="pullClipboard()">pull from kali</button>
      <button onclick="pushClipboard()">push to kali</button>
    </div>
    <div class="msg" id="clipboard-msg"></div>
  </div>
</div>

<div id="files-panel" class="panel">
  <div class="file-toolbar">
    <span id="current-path">/</span>
    <button onclick="refreshFiles()">⟳</button>
    <button onclick="goUp()">↑</button>
  </div>
  <div id="file-list"></div>
  <div class="upload-zone" onclick="document.getElementById('file-upload').click()">
    + upload file
    <input type="file" id="file-upload" style="display:none" onchange="uploadFile(this)" />
  </div>
</div>

<div id="system-panel" class="panel">
  <div style="flex:1;overflow-y:auto;padding:12px;font-size:12px" id="sys-container">
    <div id="sys-info" style="color:var(--text-dim);text-align:center;padding:30px;opacity:.5">scanning...</div>
  </div>
  <div style="padding:8px;text-align:center;background:var(--surface);border-top:1px solid var(--border)">
    <button onclick="loadSysInfo()" style="background:transparent;color:var(--text-dim);border:1px solid var(--border);padding:6px 16px;cursor:pointer;font-family:inherit;font-size:11px;border-radius:4px;transition:all .2s">⟳ refresh</button>
  </div>
</div>

<div id="power-panel" class="panel">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:12px">
    <div style="color:var(--text);font-size:14px;font-weight:700;letter-spacing:1px;opacity:.6">⚡ POWER CONTROL</div>
    <div class="power-grid">
      <button class="power-btn power-shutdown" onclick="powerAction('shutdown')">SHUTDOWN</button>
      <button class="power-btn power-reboot" onclick="powerAction('reboot')">REBOOT</button>
      <button class="power-btn power-suspend" onclick="powerAction('suspend')">SUSPEND</button>
      <button class="power-btn power-logout" onclick="powerAction('logout')">LOGOUT</button>
    </div>
    <div id="power-msg"></div>
  </div>
</div>

<div id="editor-overlay">
  <div id="editor-bar">
    <span id="editor-path">file</span>
    <div>
      <button onclick="saveFile()">save</button>
      <button onclick="closeEditor()">close</button>
    </div>
  </div>
  <textarea id="editor-text" spellcheck="false"></textarea>
</div>

<div id="status">connecting...</div>

<script>
const PASSWORD = '{{password}}';
const socket = io({auth:{token:PASSWORD}});
let screenRunning=false, webcamRunning=false, remoteActive=false, audioActive=false;
let currentPath='/home', editingPath='', screenW=1920, screenH=1080, audioCtx=null;

function authHeaders(){return{'Authorization':PASSWORD}}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const tab=Array.from(document.querySelectorAll('.tab')).find(t=>t.getAttribute('onclick')?.includes(name));
  if(tab)tab.classList.add('active');
  const el=document.getElementById(name+'-panel');
  if(el)el.classList.add('active');
  if(name==='files')refreshFiles();
  if(name==='system')loadSysInfo();
}

// ====== TERMINAL ======
const output=document.getElementById('terminal-output');
const termInput=document.getElementById('terminal-input');
function appendOutput(t){output.textContent+=t;output.scrollTop=output.scrollHeight}

socket.on('shell:data',d=>{
  appendOutput(d.data);
});

termInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&termInput.value.trim()){
    socket.emit('shell:input',{data:termInput.value+'\n'});
    termInput.value='';
  }
});

document.getElementById('terminal-input-btn').onclick=()=>{
  const cmd=document.getElementById('terminal-input').value;
  if(!cmd.trim())return;
  fetch('/api/exec',{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify({cmd})})
    .then(r=>r.json()).then(d=>{
      let out='$ '+cmd+'\n';
      if(d.stdout)out+=d.stdout;
      if(d.stderr)out+=d.stderr;
      appendOutput(out);
    });
  document.getElementById('terminal-input').value='';
};

// ====== SCREEN ======
const screenImg=document.getElementById('screen-image');
const screenPlaceholder=document.getElementById('screen-placeholder');
const remoteCursor=document.getElementById('remote-cursor');
const remoteStatus=document.getElementById('remote-status');
const remoteToggle=document.getElementById('remote-toggle');
socket.on('screen:frame',d=>{
  const img='data:image/jpeg;base64,'+d.image;
  screenImg.src=img;screenImg.style.display='';screenPlaceholder.style.display='none'
});
function startScreen(){if(!screenRunning){screenRunning=true;socket.emit('start:screen');screenPlaceholder.textContent='streaming...'}}
function stopScreen(){screenRunning=false;screenImg.style.display='none';screenPlaceholder.style.display='';screenPlaceholder.textContent='[stopped]'}
function captureScreen(){fetch('/api/screenshot',{headers:authHeaders()}).then(r=>r.json()).then(d=>{if(d.image){screenImg.src='data:image/jpeg;base64,'+d.image;screenImg.style.display='';screenPlaceholder.style.display='none'}})}

// ====== REMOTE ======
function toggleRemote(){
  remoteActive=!remoteActive;
  remoteToggle.textContent=remoteActive?'mouse:on':'mouse';
  remoteToggle.classList.toggle('active-btn',remoteActive);
  remoteStatus.style.display=remoteActive?'block':'none';
  screenImg.classList.toggle('remote-active',remoteActive);
  if(!remoteActive)remoteCursor.style.display='none';
  else remoteCursor.style.display='block';
}
function getRemoteCoords(cx,cy){
  const r=screenImg.getBoundingClientRect();
  return{x:Math.round((cx-r.left)*screenW/r.width),y:Math.round((cy-r.top)*screenH/r.height),ix:cx-r.left,iy:cy-r.top};
}
screenImg.addEventListener('mousemove',e=>{if(!remoteActive||!screenRunning)return;const c=getRemoteCoords(e.clientX,e.clientY);remoteCursor.style.left=(c.ix-2)+'px';remoteCursor.style.top=(c.iy-2)+'px';socket.emit('remote:mousemove',{x:c.x,y:c.y})});
screenImg.addEventListener('mousedown',e=>{if(!remoteActive||!screenRunning)return;e.preventDefault();const c=getRemoteCoords(e.clientX,e.clientY);socket.emit('remote:mousemove',{x:c.x,y:c.y});socket.emit('remote:mousedown',{button:['left','middle','right'][e.button]||'left'})});
screenImg.addEventListener('mouseup',e=>{if(!remoteActive||!screenRunning)return;e.preventDefault();socket.emit('remote:mouseup',{button:['left','middle','right'][e.button]||'left'})});
screenImg.addEventListener('wheel',e=>{if(!remoteActive||!screenRunning)return;e.preventDefault();socket.emit('remote:key',{key:e.deltaY<0?'Page_Up':'Page_Down'})});
screenImg.addEventListener('mouseleave',()=>{if(remoteActive)remoteCursor.style.display='none'});
document.addEventListener('keydown',e=>{
  if(!remoteActive||!screenRunning||e.ctrlKey||e.metaKey||e.altKey)return;
  const km={'Enter':'Return','Backspace':'BackSpace','Tab':'Tab','Escape':'Escape','Delete':'Delete','Home':'Home','End':'End','PageUp':'Page_Up','PageDown':'Page_Down','ArrowUp':'Up','ArrowDown':'Down','ArrowLeft':'Left','ArrowRight':'Right','F1':'F1','F2':'F2','F3':'F3','F4':'F4','F5':'F5','F6':'F6','F7':'F7','F8':'F8','F9':'F9','F10':'F10','F11':'F11','F12':'F12'};
  const k=km[e.key];if(k){e.preventDefault();socket.emit('remote:key',{key:k})}else if(e.key.length===1){socket.emit('remote:type',{text:e.key})}
});

// ====== WEBCAM ======
const webcamImg=document.getElementById('webcam-image');
const webcamPlaceholder=document.getElementById('webcam-placeholder');
socket.on('webcam:frame',d=>{webcamImg.src='data:image/jpeg;base64,'+d.image;webcamImg.style.display='';webcamPlaceholder.style.display='none'});
function startWebcam(){if(!webcamRunning){webcamRunning=true;socket.emit('start:webcam');webcamPlaceholder.textContent='streaming...'}}
function stopWebcam(){webcamRunning=false;webcamImg.style.display='none';webcamPlaceholder.style.display='';webcamPlaceholder.textContent='[stopped]'}
function captureWebcam(){fetch('/api/webcam',{headers:authHeaders()}).then(r=>r.json()).then(d=>{if(d.image){webcamImg.src='data:image/jpeg;base64,'+d.image;webcamImg.style.display='';webcamPlaceholder.style.display='none'}})}

// ====== AUDIO ======
const audioLevel=document.getElementById('audio-level');
const audioBtn=document.getElementById('audio-btn');
const audioStatus=document.getElementById('audio-status');
socket.on('audio:data',d=>{
  const data=Uint8Array.from(atob(d.data),c=>c.charCodeAt(0));
  const max=Math.max(...data.map(v=>Math.abs(v-128)))||1;
  audioLevel.style.width=Math.min(100,(max/128*100))+'%';
});
function toggleAudio(){
  audioActive=!audioActive;
  if(audioActive){
    socket.emit('audio:start');
    audioBtn.textContent='⏹ stop mic';
    audioBtn.classList.add('active-audio');
    audioStatus.textContent='streaming...';audioStatus.style.opacity='1';audioStatus.style.color='var(--green)';
  }else{
    socket.emit('audio:stop');
    audioBtn.textContent='🎤 start mic stream';
    audioBtn.classList.remove('active-audio');
    audioLevel.style.width='0%';
    audioStatus.textContent='idle';audioStatus.style.opacity='.6';audioStatus.style.color='';
  }
}

// ====== CLIPBOARD ======
function pullClipboard(){
  const msg=document.getElementById('clipboard-msg');
  fetch('/api/clipboard',{headers:authHeaders()}).then(r=>r.json()).then(d=>{
    document.getElementById('clipboard-text').value=d.content||'';
    msg.textContent='✓ pulled from kali';msg.style.color='var(--green)';
  }).catch(()=>{msg.textContent='✗ error';msg.style.color='var(--red)'});
}
function pushClipboard(){
  const msg=document.getElementById('clipboard-msg');
  const text=document.getElementById('clipboard-text').value;
  fetch('/api/clipboard',{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify({content:text})})
    .then(r=>r.json()).then(d=>{msg.textContent=d.ok?'✓ pushed to kali':'✗ error';msg.style.color=d.ok?'var(--green)':'var(--red)'});
}

// ====== FILES ======
function refreshFiles(dir){
  const path=dir||currentPath;
  fetch('/api/ls?path='+encodeURIComponent(path),{headers:authHeaders()}).then(r=>r.json()).then(d=>{
    if(d.error)return;currentPath=d.path;
    document.getElementById('current-path').textContent=d.path;
    const list=document.getElementById('file-list');list.innerHTML='';
    d.items.forEach(item=>{
      const div=document.createElement('div');div.className='file-item';
      const name=document.createElement('span');name.className='name'+(item.type==='dir'?' dir':'');
      name.textContent=(item.type==='dir'?'📁 ':'📄 ')+item.name;
      if(item.type==='dir')name.onclick=()=>refreshFiles(d.path+'/'+item.name);
      div.appendChild(name);
      const actions=document.createElement('div');actions.className='actions';
      if(item.type==='file'){
        const sz=document.createElement('span');sz.className='size';sz.textContent=formatBytes(item.size);actions.appendChild(sz);
        const ed=document.createElement('button');ed.className='edit-btn';ed.textContent='edit';ed.onclick=e=>{e.stopPropagation();editFile(d.path+'/'+item.name)};actions.appendChild(ed);
        const dl=document.createElement('button');dl.className='edit-btn';dl.textContent='dl';dl.onclick=e=>{e.stopPropagation();window.open('/api/download?path='+encodeURIComponent(d.path+'/'+item.name)+'&auth='+PASSWORD)};actions.appendChild(dl);
      }
      const del=document.createElement('button');del.textContent='✕';del.onclick=e=>{e.stopPropagation();if(confirm('delete?'))fetch('/api/delete',{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify({path:d.path+'/'+item.name})}).then(()=>refreshFiles(d.path))};
      actions.appendChild(del);div.appendChild(actions);list.appendChild(div);
    });
  });
}
function goUp(){refreshFiles(currentPath.replace(/\/+$/,'').split('/').slice(0,-1).join('/')||'/')}
function uploadFile(input){const f=input.files[0];if(!f)return;const fd=new FormData();fd.append('file',f);fetch('/api/upload?path='+encodeURIComponent(currentPath)+'&auth='+PASSWORD,{method:'POST',body:fd}).then(()=>{refreshFiles(currentPath);input.value=''})}

// ====== EDITOR ======
function editFile(path){editingPath=path;document.getElementById('editor-path').textContent=path;document.getElementById('editor-text').value='loading...';document.getElementById('editor-overlay').classList.add('active');fetch('/api/read',{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify({path})}).then(r=>r.json()).then(d=>{document.getElementById('editor-text').value=d.content!==undefined?d.content:'error: '+(d.error||'cannot read')})}
function saveFile(){const c=document.getElementById('editor-text').value;fetch('/api/write',{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify({path:editingPath,content:c})}).then(r=>r.json()).then(d=>{const s=document.getElementById('editor-bar').querySelector('span');if(d.ok){s.textContent='✓ saved - '+editingPath;setTimeout(()=>{s.textContent=editingPath},2000)}})}
function closeEditor(){document.getElementById('editor-overlay').classList.remove('active');editingPath=''}
function formatBytes(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB'}

// ====== SYSTEM ======
function loadSysInfo(){
  const el=document.getElementById('sys-info');el.innerHTML='<span style="opacity:.5">scanning system...</span>';
  fetch('/api/sysinfo',{headers:authHeaders()}).then(r=>r.json()).then(d=>{
    if(d.error){el.innerHTML='<span style="color:var(--red)">error: '+d.error+'</span>';return}
    let h='';
    const mp=d.memory.total_mb>0?(d.memory.used_mb/d.memory.total_mb*100).toFixed(1):0;
    h+='<div class="sys-section"><div class="title">💾 memory</div><div class="row">total <b>'+d.memory.total_mb+' MB</b> · used <b>'+(mp>80?'<span style="color:var(--red)">':'')+d.memory.used_mb+' MB'+(mp>80?'</span>':'')+'</b> · free <b>'+d.memory.avail_mb+' MB</b></div><div class="sys-bar"><div style="width:'+mp+'%"></div></div>';
    if(d.memory.swap_total_mb>0)h+='<div class="row">swap <b>'+d.memory.swap_free_mb+'/'+d.memory.swap_total_mb+' MB</b></div>';
    h+='</div>';
    h+='<div class="sys-section"><div class="title">💽 disk</div><div class="row">total <b>'+d.disk.total_gb+' GB</b> · used '+d.disk.percent+'%</div><div class="sys-bar"><div style="width:'+d.disk.percent+'%"></div></div></div>';
    h+='<div class="sys-section"><div class="title">⚡ cpu</div><div class="row" style="font-size:11px;color:var(--text-dim)">'+d.cpu.model+'</div><div class="row">cores <b>'+d.cpu.cores+'</b> · load <b>'+d.cpu.load_1m+'</b> / <b>'+d.cpu.load_5m+'</b> / <b>'+d.cpu.load_15m+'</b></div></div>';
    if(d.temperatures&&d.temperatures.cpu&&d.temperatures.cpu.length>0){
      h+='<div class="sys-section"><div class="title">🌡 temps</div>';
      d.temperatures.cpu.forEach(t=>{h+='<div class="row">'+t.type+': <b>'+(t.temp_c>70?'<span style="color:var(--red)">':'')+t.temp_c+'°C'+(t.temp_c>70?'</span>':'')+'</b></div>'});
      if(d.temperatures.gpu_c)h+='<div class="row">gpu: <b>'+(d.temperatures.gpu_c>70?'<span style="color:var(--red)">':'')+d.temperatures.gpu_c+'°C'+(d.temperatures.gpu_c>70?'</span>':'')+'</b></div>';
      h+='</div>';
    }
    h+='<div style="text-align:center;padding:8px;color:var(--text-dim);font-size:11px;opacity:.5">procs: '+d.processes+'</div>';
    el.innerHTML=h;
  }).catch(()=>{el.innerHTML='<span style="color:var(--red)">connection error</span>'});
}

// ====== POWER ======
function powerAction(a){
  if(!confirm('confirm: '+a.toUpperCase()+'?'))return;
  const msg=document.getElementById('power-msg');
  msg.textContent='executing '+a+'...';msg.style.color='var(--yellow)';
  fetch('/api/power',{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify({action:a})})
    .then(r=>r.json()).then(d=>{msg.textContent=d.ok?'✓ command sent - '+d.action:'✗ error';msg.style.color=d.ok?'var(--green)':'var(--red)'});
}

// ====== STATUS ======
fetch('/api/info',{headers:authHeaders()}).then(r=>r.json()).then(d=>{
  document.getElementById('status').textContent=d.hostname+' ✦ '+d.user+' ✦ '+(d.ip||'');
  if(d.screen_w){screenW=d.screen_w;screenH=d.screen_h}
}).catch(()=>{});
setTimeout(()=>refreshFiles(),500);
</script>
